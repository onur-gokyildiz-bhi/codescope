name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
            ext: .exe
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            ext: ""
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            ext: ""
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
            ext: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config perl make
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
            echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
            echo "CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++" >> $GITHUB_ENV
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        run: |
          cd crates/web/frontend
          npm ci
          npm run build

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-release-

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }} -p codescope -p codescope-mcp -p codescope-web
        env:
          RUST_MIN_STACK: "16777216"

      - name: Prepare artifacts (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/codescope dist/
          cp target/${{ matrix.target }}/release/codescope-mcp dist/
          cp target/${{ matrix.target }}/release/codescope-web dist/
          cp README.md LICENSE dist/
          cd dist
          tar czf ../codescope-${{ github.ref_name }}-${{ matrix.target }}.tar.gz *

      - name: Prepare artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "target/${{ matrix.target }}/release/codescope.exe" dist/
          Copy-Item "target/${{ matrix.target }}/release/codescope-mcp.exe" dist/
          Copy-Item "target/${{ matrix.target }}/release/codescope-web.exe" dist/
          Copy-Item README.md dist/
          Copy-Item LICENSE dist/
          Compress-Archive -Path dist/* -DestinationPath "codescope-${{ github.ref_name }}-${{ matrix.target }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: codescope-${{ matrix.target }}
          path: codescope-${{ github.ref_name }}-${{ matrix.target }}.*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f \( -name "*.zip" -o -name "*.tar.gz" \) -exec sha256sum {} \; | sort > ../SHA256SUMS.txt
          cd ..
          echo "### SHA256 Checksums" >> SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Generate release notes
        id: notes
        run: |
          cat > release_notes.md << 'NOTES'
          ## Codescope ${{ github.ref_name }}

          Rust-native code intelligence engine powered by SurrealDB knowledge graphs.

          ### What's included
          - **codescope** — CLI: index, search, query, init, install
          - **codescope-mcp** — MCP server for AI agents (Claude Code, Cursor, Zed, etc.)
          - **codescope-web** — Web UI with interactive graph visualization

          ### One-line install

          **Windows (PowerShell):**
          ```powershell
          irm https://raw.githubusercontent.com/onur-gokyildiz-bhi/codescope/main/install.ps1 | iex
          ```

          **Linux / macOS:**
          ```bash
          curl -fsSL https://raw.githubusercontent.com/onur-gokyildiz-bhi/codescope/main/install.sh | bash
          ```

          ### Quick Start
          ```bash
          cd your-project
          codescope init          # creates .mcp.json + indexes codebase
          # That's it! Claude Code now has 52 code intelligence tools.
          ```

          ### Supported Platforms
          | Platform | Archive |
          |----------|---------|
          | Windows x64 | `codescope-${{ github.ref_name }}-x86_64-pc-windows-msvc.zip` |
          | Linux x64 | `codescope-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz` |
          | Linux ARM64 | `codescope-${{ github.ref_name }}-aarch64-unknown-linux-gnu.tar.gz` |
          | macOS ARM | `codescope-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz` |
          NOTES

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          draft: false
          prerelease: false
          files: |
            artifacts/**/*
            SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
