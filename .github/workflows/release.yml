name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
            ext: .exe
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            ext: ""
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
            ext: ""
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
            ext: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-release-

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }} -p codescope -p codescope-mcp
        env:
          RUST_MIN_STACK: "16777216"

      - name: Prepare artifacts (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/codescope dist/
          cp target/${{ matrix.target }}/release/codescope-mcp dist/
          cp README.md LICENSE dist/
          cd dist
          tar czf ../codescope-${{ github.ref_name }}-${{ matrix.target }}.tar.gz *

      - name: Prepare artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "target/${{ matrix.target }}/release/codescope.exe" dist/
          Copy-Item "target/${{ matrix.target }}/release/codescope-mcp.exe" dist/
          Copy-Item README.md dist/
          Copy-Item LICENSE dist/
          Compress-Archive -Path dist/* -DestinationPath "codescope-${{ github.ref_name }}-${{ matrix.target }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: codescope-${{ matrix.target }}
          path: codescope-${{ github.ref_name }}-${{ matrix.target }}.*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Generate release notes
        id: notes
        run: |
          VERSION=${{ github.ref_name }}
          cat > release_notes.md << 'NOTES'
          ## Codescope ${{ github.ref_name }}

          Rust-native code intelligence engine powered by SurrealDB knowledge graphs.

          ### What's included
          - **codescope** — CLI tool for indexing and querying code
          - **codescope-mcp** — MCP server for AI agent integration (Cursor, Claude Code, etc.)

          ### Installation

          **Windows (PowerShell):**
          ```powershell
          irm https://raw.githubusercontent.com/onur-gokyildiz-bhi/codescope/main/install.ps1 | iex
          ```

          **Linux / macOS:**
          ```bash
          curl -fsSL https://raw.githubusercontent.com/onur-gokyildiz-bhi/codescope/main/install.sh | bash
          ```

          **Manual download:** Download the archive for your platform below, extract, and add to PATH.

          ### Supported Platforms
          | Platform | Archive |
          |----------|---------|
          | Windows x64 | `codescope-${{ github.ref_name }}-x86_64-pc-windows-msvc.zip` |
          | Linux x64 | `codescope-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz` |
          | macOS x64 (Intel) | `codescope-${{ github.ref_name }}-x86_64-apple-darwin.tar.gz` |
          | macOS ARM (Apple Silicon) | `codescope-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz` |

          ### Quick Start
          ```bash
          codescope index ./my-project --repo my-project
          codescope search "handleRequest"
          codescope stats
          ```
          NOTES

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          draft: false
          prerelease: false
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
