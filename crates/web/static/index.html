<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Codescope — 3D Knowledge Graph</title>
<script src="https://unpkg.com/3d-force-graph"></script>
<style>
:root {
  --bg: #0d1117; --surface: #161b22; --surface2: #1c2128; --border: #30363d;
  --text: #e6edf3; --text-dim: #8b949e; --accent: #58a6ff; --green: #3fb950;
  --red: #f85149; --amber: #d29922; --purple: #bc8cff; --violet: #da77f2;
  --radius: 8px; --shadow: 0 4px 24px rgba(0,0,0,.4);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); overflow:hidden; height:100vh; display:flex; flex-direction:column; }

/* ====== Header ====== */
#header { display:flex; align-items:center; gap:10px; padding:8px 14px; background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0; z-index:20; }
#logo { font-size:15px; font-weight:700; color:var(--accent); cursor:pointer; white-space:nowrap; user-select:none; }
#logo span { font-weight:400; color:var(--text-dim); font-size:11px; margin-left:4px; }
#search-wrap { flex:1; position:relative; min-width:0; max-width:480px; }
#search { width:100%; padding:7px 10px 7px 32px; background:var(--bg); border:1px solid var(--border); border-radius:var(--radius); color:var(--text); font-size:14px; outline:none; transition:border-color .15s; }
#search:focus { border-color:var(--accent); }
#search-icon { position:absolute; left:10px; top:50%; transform:translateY(-50%); color:var(--text-dim); pointer-events:none; }
#autocomplete { position:absolute; top:calc(100% + 4px); left:0; right:0; background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius); max-height:50vh; overflow-y:auto; display:none; z-index:30; box-shadow:var(--shadow); }
.ac-item { padding:10px 12px; cursor:pointer; border-bottom:1px solid #21262d; }
.ac-item:hover { background:#21262d; }
.ac-name { color:var(--accent); font-size:13px; font-weight:600; }
.ac-file { color:var(--text-dim); font-size:11px; margin-top:2px; word-break:break-all; }

/* ====== Main ====== */
#main { display:flex; flex:1; overflow:hidden; position:relative; }
#graph-container { flex:1; position:relative; }
#graph-container canvas { display:block; }

/* ====== Sidebar ====== */
#sidebar { width:320px; background:var(--surface); border-left:1px solid var(--border); overflow-y:auto; flex-shrink:0; display:none; font-size:13px; z-index:10; }
#sidebar.open { display:flex; flex-direction:column; }
.sb-head { padding:12px 14px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
.sb-head h2 { font-size:14px; color:var(--accent); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; }
.sb-close { background:none; border:none; color:var(--text-dim); cursor:pointer; font-size:20px; padding:4px 8px; border-radius:4px; line-height:1; }
.sb-close:hover { background:#21262d; color:var(--text); }
.sb-section { padding:10px 14px; border-bottom:1px solid #21262d; }
.sb-section h3 { font-size:10px; text-transform:uppercase; color:var(--text-dim); margin-bottom:5px; letter-spacing:.5px; }
.sb-badge { display:inline-block; padding:2px 8px; border-radius:5px; font-size:11px; }
.sb-sig { font-size:11px; color:var(--green); font-family:'Cascadia Code','Fira Code','SF Mono',monospace; background:var(--bg); padding:8px 10px; border-radius:6px; margin-top:4px; overflow-x:auto; white-space:pre; }
.sb-list { list-style:none; }
.sb-list li { padding:6px 0; cursor:pointer; color:var(--accent); font-size:12px; border-bottom:1px solid #21262d44; }
.sb-list li:hover { color:#f0f6fc; }
.sb-list .dim { color:var(--text-dim); font-size:10px; display:block; margin-top:1px; }

/* ====== Legend ====== */
#legend { position:absolute; bottom:50px; left:14px; background:rgba(22,27,34,.92); border:1px solid var(--border); border-radius:var(--radius); padding:10px 14px; font-size:11px; z-index:10; backdrop-filter:blur(10px); pointer-events:none; }
.lg-item { display:flex; align-items:center; gap:7px; margin:3px 0; }
.lg-dot { width:10px; height:10px; border-radius:50%; }

/* ====== Stats Bar ====== */
#stats-bar { display:flex; gap:8px; padding:6px 14px; background:var(--surface); border-top:1px solid var(--border); flex-shrink:0; flex-wrap:wrap; z-index:10; }
.stat { background:#21262d; padding:3px 10px; border-radius:12px; font-size:11px; white-space:nowrap; }
.stat b { color:var(--accent); }

/* ====== Controls Hint ====== */
#controls-hint { position:absolute; top:14px; left:14px; background:rgba(22,27,34,.85); border:1px solid var(--border); border-radius:var(--radius); padding:8px 12px; font-size:11px; color:var(--text-dim); z-index:10; backdrop-filter:blur(10px); pointer-events:none; line-height:1.6; }

/* ====== Responsive ====== */
@media (max-width: 768px) {
  #sidebar { position:absolute; right:0; top:0; bottom:0; width:280px; box-shadow: -4px 0 20px rgba(0,0,0,.5); }
  #legend { bottom:50px; left:8px; font-size:10px; padding:6px 10px; }
  #controls-hint { display:none; }
}
</style>
</head>
<body>

<div id="header">
  <div id="logo" onclick="loadGraph()">Codescope<span>3D Graph</span></div>
  <div id="search-wrap">
    <svg id="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="search" type="text" placeholder="Search functions, classes, files..." autocomplete="off" />
    <div id="autocomplete"></div>
  </div>
</div>

<div id="main">
  <div id="graph-container">
    <div id="controls-hint">
      Left drag: rotate &middot; Right drag: pan &middot; Scroll: zoom<br>
      Click node: explore &middot; Click background: reset
    </div>
    <div id="legend">
      <div class="lg-item"><div class="lg-dot" style="background:#58A6FF"></div> Function</div>
      <div class="lg-item"><div class="lg-dot" style="background:#3FB950"></div> Class / Struct / Trait</div>
      <div class="lg-item"><div class="lg-dot" style="background:#8B949E"></div> File</div>
      <div class="lg-item"><div class="lg-dot" style="background:#F85149"></div> Caller</div>
      <div class="lg-item"><div class="lg-dot" style="background:#D29922"></div> Callee</div>
      <div class="lg-item"><div class="lg-dot" style="background:#BC8CFF"></div> Sibling</div>
    </div>
  </div>
  <div id="sidebar">
    <div class="sb-head"><h2 id="sb-title">-</h2><button class="sb-close" onclick="closeSidebar()">&times;</button></div>
    <div id="sb-content"></div>
  </div>
</div>

<div id="stats-bar"></div>

<script>
// ===== Color config =====
const KIND_COLORS = {
  'function': '#58A6FF',
  'class':    '#3FB950',
  'struct':   '#3FB950',
  'trait':    '#3FB950',
  'file':     '#8B949E',
  'caller':   '#F85149',
  'callee':   '#D29922',
  'sibling':  '#BC8CFF',
  'skill':    '#DA77F2',
};

const EDGE_COLORS = {
  'calls':     '#30363D',
  'same_file': '#1C2333',
  'contains':  '#21262D',
};

function nodeColor(node) {
  return KIND_COLORS[node.kind] || '#58A6FF';
}

function nodeSize(node, centerName) {
  if (centerName && node.name === centerName) return 8;
  return 4;
}

function edgeColor(edge) {
  return EDGE_COLORS[edge.kind] || '#30363D';
}

// ===== Globals =====
let graph = null;
let currentCenter = null;
let graphData = { nodes: [], links: [] };

// ===== Init 3D Graph =====
function initGraph() {
  const container = document.getElementById('graph-container');

  graph = ForceGraph3D()(container)
    .backgroundColor('#0d1117')
    .showNavInfo(false)
    // Nodes
    .nodeVal(n => {
      const s = nodeSize(n, currentCenter);
      return s * s; // volume-based sizing
    })
    .nodeColor(n => nodeColor(n))
    .nodeOpacity(0.9)
    .nodeResolution(12)
    .nodeLabel(n => {
      const kind = n.kind || 'unknown';
      const file = n.file_path ? `\n${n.file_path}` : '';
      return `${n.name} (${kind})${file}`;
    })
    // Edges
    .linkColor(e => edgeColor(e))
    .linkOpacity(0.4)
    .linkWidth(e => e.kind === 'calls' ? 1.2 : 0.6)
    .linkDirectionalParticles(e => e.kind === 'calls' ? 2 : 0)
    .linkDirectionalParticleWidth(1.5)
    .linkDirectionalParticleSpeed(0.005)
    .linkDirectionalParticleColor(e => '#58A6FF')
    // Interactions
    .onNodeClick(handleNodeClick)
    .onBackgroundClick(() => {
      closeSidebar();
    })
    // Force config
    .d3AlphaDecay(0.02)
    .d3VelocityDecay(0.3)
    .warmupTicks(80)
    .cooldownTicks(120);

  // Adjust forces
  graph.d3Force('charge').strength(-60);
  graph.d3Force('link').distance(e => e.kind === 'same_file' ? 30 : 70);

  // Add center force
  graph.d3Force('center', null);
  graph.d3Force('x', null);
  graph.d3Force('y', null);
  graph.d3Force('z', null);
}

// ===== Handle resize =====
window.addEventListener('resize', () => {
  if (graph) graph.width(document.getElementById('graph-container').clientWidth)
                   .height(document.getElementById('graph-container').clientHeight);
});

// ===== Load graph data =====
async function loadGraph(center) {
  currentCenter = center || null;
  try {
    const url = center
      ? `/api/graph?center=${encodeURIComponent(center)}&depth=2`
      : '/api/graph';
    const r = await fetch(url);
    const data = await r.json();

    // Deduplicate nodes
    const nodeMap = new Map();
    (data.nodes || []).forEach(n => { if (!nodeMap.has(n.id)) nodeMap.set(n.id, n); });
    const nodes = Array.from(nodeMap.values());
    const nodeIds = new Set(nodes.map(n => n.id));

    // Filter valid edges and remap to source/target
    const links = (data.edges || [])
      .filter(e => nodeIds.has(e.source) && nodeIds.has(e.target))
      .map(e => ({ source: e.source, target: e.target, kind: e.kind || 'calls' }));

    graphData = { nodes, links };

    if (!graph) initGraph();
    graph.graphData(graphData);

    // Focus on center node after layout settles
    if (center) {
      setTimeout(() => {
        const cn = graphData.nodes.find(n => n.name === center);
        if (cn) {
          graph.cameraPosition(
            { x: cn.x + 120, y: cn.y + 60, z: cn.z + 120 },
            { x: cn.x, y: cn.y, z: cn.z },
            1200
          );
          openSidebar(cn);
        }
      }, 600);
    }
  } catch (e) {
    console.error('Failed to load graph:', e);
  }
}

// ===== Node click =====
function handleNodeClick(node) {
  if (!node) return;

  openSidebar(node);

  // Navigate to this node's graph if it is a function/class
  if (node.kind !== 'file') {
    document.getElementById('search').value = node.name;
    loadGraph(node.name);
  }

  // Fly camera to clicked node
  const dist = 200;
  const angle = Math.random() * Math.PI * 2;
  graph.cameraPosition(
    { x: node.x + dist * Math.cos(angle), y: node.y + 60, z: node.z + dist * Math.sin(angle) },
    { x: node.x, y: node.y, z: node.z },
    1000
  );
}

// ===== Sidebar =====
function openSidebar(d) {
  const sidebar = document.getElementById('sidebar');
  sidebar.classList.add('open');
  document.getElementById('sb-title').textContent = d.name;

  const color = nodeColor(d);
  let h = '';

  // Kind badge
  h += `<div class="sb-section">
    <span class="sb-badge" style="background:${color}22;color:${color}">${d.kind || 'unknown'}</span>
  </div>`;

  // File path
  if (d.file_path) {
    h += `<div class="sb-section"><h3>File</h3>
      <div style="color:var(--text);word-break:break-all;font-size:12px">${esc(d.file_path)}</div>
    </div>`;
  }

  // Signature + callers/callees placeholders
  if (['function','caller','callee','sibling'].includes(d.kind)) {
    h += `<div class="sb-section" id="sb-sig"><h3>Signature</h3><div style="color:var(--text-dim)">Loading...</div></div>`;
    h += `<div class="sb-section" id="sb-callers"><h3>Called By</h3><div style="color:var(--text-dim)">Loading...</div></div>`;
    h += `<div class="sb-section" id="sb-callees"><h3>Calls</h3><div style="color:var(--text-dim)">Loading...</div></div>`;
  }

  document.getElementById('sb-content').innerHTML = h;

  if (['function','caller','callee','sibling'].includes(d.kind)) {
    fetchDetails(d.name);
  }
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
}

async function fetchDetails(name) {
  const safe = name.replace(/'/g, '');
  try {
    const [sigR, callerR, calleeR] = await Promise.all([
      fetch(`/api/query?q=${encodeURIComponent("SELECT signature,start_line,end_line FROM `function` WHERE name='" + safe + "' LIMIT 1")}`),
      fetch(`/api/query?q=${encodeURIComponent("SELECT <-calls<-`function`.{name,file_path} AS callers FROM `function` WHERE name='" + safe + "'")}`),
      fetch(`/api/query?q=${encodeURIComponent("SELECT ->calls->`function`.{name,file_path} AS callees FROM `function` WHERE name='" + safe + "'")}`)
    ]);
    const [sig, caller, callee] = await Promise.all([sigR.json(), callerR.json(), calleeR.json()]);

    const sigEl = document.getElementById('sb-sig');
    if (sigEl) {
      if (sig[0]?.signature) {
        sigEl.innerHTML = `<h3>Signature</h3><div class="sb-sig">${esc(sig[0].signature)}</div>
          <div style="color:var(--text-dim);font-size:10px;margin-top:4px">Lines ${sig[0].start_line}-${sig[0].end_line} (${sig[0].end_line - sig[0].start_line} lines)</div>`;
      } else {
        sigEl.innerHTML = '<h3>Signature</h3><div style="color:var(--text-dim)">-</div>';
      }
    }

    const renderList = (el, items, label) => {
      if (!el) return;
      if (items?.length) {
        el.innerHTML = `<h3>${label} (${items.length})</h3><ul class="sb-list">${items.map(c =>
          `<li onclick="nav('${(c.name || '').replace(/'/g, "\\'")}')"><b>${esc(c.name || '?')}</b><span class="dim">${esc(c.file_path || '')}</span></li>`
        ).join('')}</ul>`;
      } else {
        el.innerHTML = `<h3>${label}</h3><div style="color:var(--text-dim)">None</div>`;
      }
    };

    renderList(document.getElementById('sb-callers'), caller[0]?.callers, 'Called By');
    renderList(document.getElementById('sb-callees'), callee[0]?.callees, 'Calls');
  } catch (e) {
    console.error('Failed to fetch details:', e);
  }
}

// ===== Search / Autocomplete =====
let searchTimeout;
const searchInput = document.getElementById('search');
const autocomplete = document.getElementById('autocomplete');

searchInput.addEventListener('input', () => {
  clearTimeout(searchTimeout);
  const q = searchInput.value.trim();
  if (q.length < 2) { autocomplete.style.display = 'none'; return; }
  searchTimeout = setTimeout(() => liveSearch(q), 200);
});

searchInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    autocomplete.style.display = 'none';
    const q = searchInput.value.trim();
    if (q) loadGraph(q);
    else loadGraph();
  }
  if (e.key === 'Escape') {
    autocomplete.style.display = 'none';
    searchInput.blur();
  }
});

document.addEventListener('click', e => {
  if (!e.target.closest('#search-wrap')) autocomplete.style.display = 'none';
});

async function liveSearch(q) {
  try {
    const r = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
    const d = await r.json();
    if (!d.length) { autocomplete.style.display = 'none'; return; }
    autocomplete.innerHTML = d.slice(0, 12).map(item => {
      return `<div class="ac-item" onclick="nav('${item.name.replace(/'/g, "\\'")}')">
        <div class="ac-name">${esc(item.name)}</div>
        <div class="ac-file">${esc(item.file_path || '')}</div>
      </div>`;
    }).join('');
    autocomplete.style.display = 'block';
  } catch (e) {
    autocomplete.style.display = 'none';
  }
}

function nav(name) {
  searchInput.value = name;
  autocomplete.style.display = 'none';
  loadGraph(name);
}

// ===== Stats =====
async function loadStats() {
  try {
    const r = await fetch('/api/stats');
    const d = await r.json();
    let h = '';
    const entries = [
      ['files', 'Files'], ['functions', 'Functions'], ['classes', 'Classes'],
      ['imports', 'Imports'], ['configs', 'Configs'], ['docs', 'Docs'], ['packages', 'Packages']
    ];
    for (const [key, label] of entries) {
      const t = d[key] || 0;
      if (t > 0) h += `<span class="stat"><b>${t.toLocaleString()}</b> ${label}</span>`;
    }
    document.getElementById('stats-bar').innerHTML = h || '<span class="stat" style="color:var(--text-dim)">No data indexed yet</span>';
  } catch (e) {
    document.getElementById('stats-bar').innerHTML = '<span class="stat" style="color:var(--red)">Connection error</span>';
  }
}

// ===== Helpers =====
function esc(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

// ===== Boot =====
loadStats();
loadGraph();
</script>
</body>
</html>
