<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Codescope — Knowledge Graph Explorer</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
:root {
  --bg: #0d1117; --surface: #161b22; --surface2: #1c2128; --border: #30363d;
  --text: #c9d1d9; --text-dim: #8b949e; --accent: #58a6ff; --green: #3fb950;
  --red: #f78166; --purple: #d2a8ff; --orange: #ffa657; --pink: #f778ba;
  --yellow: #d29922; --cyan: #79c0ff;
  --radius: 8px; --shadow: 0 4px 24px rgba(0,0,0,.4);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); overflow:hidden; height:100dvh; display:flex; flex-direction:column; touch-action:none; }

/* ====== Header ====== */
#header { display:flex; align-items:center; gap:8px; padding:8px 12px; background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0; z-index:20; }
#logo { font-size:15px; font-weight:700; color:var(--accent); cursor:pointer; white-space:nowrap; }
#logo span { font-weight:400; color:var(--text-dim); font-size:11px; margin-left:3px; }
#search-wrap { flex:1; position:relative; min-width:0; }
#search { width:100%; padding:7px 10px 7px 32px; background:var(--bg); border:1px solid var(--border); border-radius:var(--radius); color:var(--text); font-size:14px; outline:none; transition:border-color .15s; }
#search:focus { border-color:var(--accent); }
#search-icon { position:absolute; left:10px; top:50%; transform:translateY(-50%); color:var(--text-dim); font-size:13px; pointer-events:none; }
#search-results { position:absolute; top:calc(100% + 4px); left:0; right:0; background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius); max-height:60vh; overflow-y:auto; display:none; z-index:30; box-shadow:var(--shadow); }
.sr-item { padding:10px 12px; cursor:pointer; border-bottom:1px solid #21262d; }
.sr-item:hover,.sr-item:active { background:#21262d; }
.sr-name { color:var(--accent); font-size:13px; font-weight:600; }
.sr-file { color:var(--text-dim); font-size:11px; margin-top:2px; word-break:break-all; }
.sr-layer { font-size:10px; margin-left:6px; padding:1px 5px; border-radius:4px; }

/* View toggle - desktop */
#view-toggle { display:flex; gap:2px; background:var(--bg); border-radius:var(--radius); padding:2px; flex-shrink:0; }
.vt-btn { padding:5px 12px; font-size:12px; border:none; border-radius:6px; cursor:pointer; color:var(--text-dim); background:transparent; transition:all .15s; }
.vt-btn.active { background:var(--border); color:var(--text); }

/* ====== Stats Bar ====== */
#stats { display:flex; gap:6px; padding:6px 12px; background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0; flex-wrap:wrap; overflow-x:auto; -webkit-overflow-scrolling:touch; }
.stat { background:#21262d; padding:3px 10px; border-radius:12px; font-size:11px; white-space:nowrap; }
.stat b { color:var(--accent); }

/* ====== Main Layout ====== */
#main { display:flex; flex:1; overflow:hidden; position:relative; }
#graph-container { flex:1; position:relative; overflow:hidden; }
#graph-container svg { position:absolute; top:0; left:0; width:100%; height:100%; }
#loading { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:14px; color:var(--text-dim); z-index:5; }

/* ====== Sidebar (desktop: right panel, mobile: bottom sheet) ====== */
#sidebar { width:320px; background:var(--surface); border-left:1px solid var(--border); overflow-y:auto; flex-shrink:0; display:none; font-size:13px; }
#sidebar.open { display:block; }
.sb-head { padding:12px 14px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
.sb-head h2 { font-size:14px; color:var(--accent); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; }
.sb-close { background:none; border:none; color:var(--text-dim); cursor:pointer; font-size:20px; padding:4px 8px; border-radius:4px; }
.sb-close:hover { background:#21262d; color:var(--text); }
.sb-section { padding:10px 14px; border-bottom:1px solid #21262d; }
.sb-section h3 { font-size:10px; text-transform:uppercase; color:var(--text-dim); margin-bottom:5px; letter-spacing:.5px; }
.sb-badge { display:inline-block; padding:2px 8px; border-radius:5px; font-size:11px; }
.sb-sig { font-size:11px; color:var(--green); font-family:'Cascadia Code','Fira Code','SF Mono',monospace; background:var(--bg); padding:8px 10px; border-radius:6px; margin-top:4px; overflow-x:auto; white-space:pre; -webkit-overflow-scrolling:touch; }
.sb-list { list-style:none; }
.sb-list li { padding:6px 0; cursor:pointer; color:var(--accent); font-size:12px; border-bottom:1px solid #21262d44; }
.sb-list li:hover,.sb-list li:active { color:#f0f6fc; }
.sb-list .dim { color:var(--text-dim); font-size:10px; display:block; margin-top:1px; }

/* ====== Legend ====== */
#legend { position:absolute; bottom:12px; left:12px; background:var(--surface)ee; border:1px solid var(--border); border-radius:var(--radius); padding:8px 12px; font-size:10px; z-index:5; backdrop-filter:blur(8px); }
.lg-item { display:flex; align-items:center; gap:6px; margin:3px 0; }
.lg-dot { width:8px; height:8px; border-radius:50%; }
.lg-rect { width:12px; height:8px; border-radius:2px; }

/* ====== Bottom Nav (mobile) ====== */
#bottom-nav { display:none; position:fixed; bottom:0; left:0; right:0; background:var(--surface); border-top:1px solid var(--border); padding:6px 0 max(6px, env(safe-area-inset-bottom)); z-index:25; }
#bottom-nav .nav-items { display:flex; justify-content:space-around; }
.nav-btn { display:flex; flex-direction:column; align-items:center; gap:2px; padding:6px 12px; background:none; border:none; color:var(--text-dim); cursor:pointer; font-size:10px; border-radius:8px; transition:all .15s; }
.nav-btn.active { color:var(--accent); }
.nav-btn svg { width:20px; height:20px; }

/* ====== Tooltip ====== */
#tooltip { position:absolute; background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius); padding:10px 12px; font-size:12px; pointer-events:none; display:none; max-width:300px; z-index:15; box-shadow:var(--shadow); }
.tt-name { font-weight:600; color:var(--accent); }
.tt-file { color:var(--text-dim); font-size:10px; margin-top:2px; }
.tt-badge { display:inline-block; padding:1px 6px; border-radius:4px; font-size:10px; margin-top:3px; }

/* ====== Graph Styles ====== */
.node circle,.node rect { cursor:pointer; transition:stroke-width .1s; }
.node text { font-size:9px; fill:var(--text-dim); pointer-events:none; }
.node:hover circle,.node:hover rect { stroke:#f0f6fc; stroke-width:2.5px; }
.node:hover text { fill:#f0f6fc; font-weight:600; }
.node.highlighted circle { stroke:var(--yellow); stroke-width:3px; animation:pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{stroke-opacity:1} 50%{stroke-opacity:.4} }
.link-calls { stroke:var(--accent); stroke-opacity:.35; }
.link-same_file { stroke:var(--border); stroke-opacity:.2; stroke-dasharray:3 2; }
.link-contains { stroke:var(--green); stroke-opacity:.2; stroke-dasharray:2 2; }

/* ====== Mobile Bottom Sheet ====== */
#sheet-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:40; }
#sheet { display:none; position:fixed; bottom:0; left:0; right:0; max-height:70vh; background:var(--surface); border-radius:16px 16px 0 0; z-index:50; overflow:hidden; flex-direction:column; box-shadow:0 -8px 32px rgba(0,0,0,.5); }
#sheet.open,#sheet-overlay.open { display:flex; }
#sheet-handle { width:36px; height:4px; background:var(--border); border-radius:2px; margin:10px auto 4px; flex-shrink:0; }
#sheet-content { overflow-y:auto; -webkit-overflow-scrolling:touch; padding-bottom:max(12px, env(safe-area-inset-bottom)); flex:1; }

/* ====== Responsive ====== */
@media (max-width: 768px) {
  #header { padding:6px 10px; gap:6px; }
  #logo span { display:none; }
  #view-toggle { display:none; }
  #stats { padding:4px 10px; gap:4px; }
  .stat { font-size:10px; padding:2px 8px; }
  #sidebar { display:none !important; }
  #bottom-nav { display:block; }
  #legend { bottom:70px; left:8px; padding:6px 8px; font-size:9px; }
  .lg-item { margin:1px 0; }
  body { padding-bottom:0; }
  #main { margin-bottom:56px; }
  .node text { font-size:7px; }
  #search { font-size:16px; /* prevent zoom on iOS */ }
}

@media (max-width: 380px) {
  #logo { font-size:13px; }
  #legend { display:none; }
}
</style>
</head>
<body>

<div id="header">
  <div id="logo" onclick="loadGraph()">Codescope<span>Knowledge Graph</span></div>
  <div id="search-wrap">
    <span id="search-icon">&#128269;</span>
    <input id="search" type="text" placeholder="Search functions, classes..." autocomplete="off" />
    <div id="search-results"></div>
  </div>
  <div id="view-toggle">
    <button class="vt-btn active" onclick="setView('graph')">Graph</button>
    <button class="vt-btn" onclick="setView('table')">Table</button>
  </div>
</div>

<div id="stats"></div>

<div id="main">
  <div id="graph-container">
    <div id="loading">Loading graph...</div>
    <div id="legend">
      <div class="lg-item"><div class="lg-dot" style="background:var(--accent)"></div> Function</div>
      <div class="lg-item"><div class="lg-dot" style="background:var(--purple)"></div> Class/Struct</div>
      <div class="lg-item"><div class="lg-rect" style="background:var(--text-dim)"></div> File</div>
      <div class="lg-item"><div class="lg-dot" style="background:var(--red)"></div> Caller</div>
      <div class="lg-item"><div class="lg-dot" style="background:var(--green)"></div> Callee</div>
      <div class="lg-item"><div class="lg-dot" style="background:#7ee787"></div> Sibling</div>
      <div class="lg-item"><div class="lg-dot" style="background:var(--orange)"></div> Config/Infra</div>
    </div>
  </div>
  <div id="sidebar">
    <div class="sb-head"><h2 id="sb-title">-</h2><button class="sb-close" onclick="closeSidebar()">&times;</button></div>
    <div id="sb-content"></div>
  </div>
</div>

<!-- Mobile Bottom Nav -->
<div id="bottom-nav">
  <div class="nav-items">
    <button class="nav-btn active" onclick="mobileNav('graph')" id="nav-graph">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="6" cy="6" r="3"/><circle cx="18" cy="18" r="3"/><circle cx="18" cy="6" r="3"/><line x1="8.5" y1="7.5" x2="15.5" y2="16.5"/><line x1="8.5" y1="6" x2="15.5" y2="6"/></svg>
      Graph
    </button>
    <button class="nav-btn" onclick="mobileNav('table')" id="nav-table">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
      Table
    </button>
    <button class="nav-btn" onclick="mobileNav('search')" id="nav-search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      Search
    </button>
    <button class="nav-btn" onclick="mobileNav('stats')" id="nav-stats">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="12" width="4" height="8"/><rect x="10" y="8" width="4" height="12"/><rect x="16" y="4" width="4" height="16"/></svg>
      Stats
    </button>
  </div>
</div>

<!-- Mobile Bottom Sheet -->
<div id="sheet-overlay" onclick="closeSheet()"></div>
<div id="sheet">
  <div id="sheet-handle"></div>
  <div id="sheet-content"></div>
</div>

<div id="tooltip"><div class="tt-name"></div><div class="tt-file"></div><div class="tt-badge"></div></div>

<script>
const isMobile = () => window.innerWidth <= 768;

const C = {
  function:'#58a6ff', caller:'#f78166', callee:'#3fb950', sibling:'#7ee787',
  class:'#d2a8ff', file:'#8b949e', config:'#d29922', doc:'#79c0ff',
  api:'#f778ba', infra:'#ffa657', package:'#a5d6ff'
};

function detectLayer(name, fp) {
  const n = (name + ' ' + fp).toLowerCase();
  if (n.match(/handler|controller|route|endpoint|api/)) return 'api';
  if (n.match(/service|usecase|domain|logic/)) return 'service';
  if (n.match(/repo|model|schema|migration|db|query/)) return 'data';
  if (n.match(/component|page|view|widget|screen|ui/)) return 'ui';
  if (n.match(/util|helper|common|shared|lib/)) return 'util';
  if (n.match(/test|spec|mock|fixture/)) return 'test';
  if (n.match(/config|env|setting/)) return 'config';
  return 'other';
}

const layerColors = {
  api:'#f78166', service:'#58a6ff', data:'#d2a8ff', ui:'#3fb950',
  util:'#8b949e', test:'#d29922', config:'#ffa657', other:'#484f58'
};

const tooltip = d3.select('#tooltip');
let simulation, svg, g, currentView = 'graph', currentCenter = null;

// ===== Stats =====
async function loadStats() {
  try {
    const r = await fetch('/api/stats');
    const d = await r.json();
    const labels = ['Files','Functions','Classes','Imports','Configs','Docs','Packages'];
    let h = '';
    if (Array.isArray(d)) d.forEach((item,i) => {
      const t = (typeof item==='object'&&item) ? (item.total||item.count||0) : 0;
      if (t>0) h += `<span class="stat"><b>${t.toLocaleString()}</b> ${labels[i]||''}</span>`;
    });
    document.getElementById('stats').innerHTML = h || '<span class="stat" style="color:var(--text-dim)">No data indexed yet</span>';
  } catch(e) {
    document.getElementById('stats').innerHTML = '<span class="stat" style="color:var(--red)">Connection error</span>';
  }
}

// ===== Search =====
let searchTimeout;
const searchInput = document.getElementById('search');
const searchResults = document.getElementById('search-results');

searchInput.addEventListener('input', () => {
  clearTimeout(searchTimeout);
  const q = searchInput.value.trim();
  if (q.length < 2) { searchResults.style.display='none'; return; }
  searchTimeout = setTimeout(() => liveSearch(q), 200);
});
searchInput.addEventListener('keydown', e => {
  if (e.key==='Enter') { searchResults.style.display='none'; const q=searchInput.value.trim(); if(q) loadGraph(q); else loadGraph(); }
  if (e.key==='Escape') { searchResults.style.display='none'; searchInput.blur(); }
});
document.addEventListener('click', e => { if(!e.target.closest('#search-wrap')) searchResults.style.display='none'; });

async function liveSearch(q) {
  try {
    const r = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
    const d = await r.json();
    if (!d.length) { searchResults.style.display='none'; return; }
    searchResults.innerHTML = d.slice(0,15).map(r => {
      const layer = detectLayer(r.name, r.file_path||'');
      return `<div class="sr-item" onclick="nav('${r.name.replace(/'/g,"\\'")}')">
        <span class="sr-name">${esc(r.name)}</span>
        <span class="sr-layer" style="background:${layerColors[layer]}22;color:${layerColors[layer]}">${layer}</span>
        <div class="sr-file">${esc(r.file_path||'')} ${r.language?'<span style="color:var(--cyan)">('+r.language+')</span>':''}</div>
      </div>`;
    }).join('');
    searchResults.style.display='block';
  } catch(e) { searchResults.style.display='none'; }
}

function nav(name) { searchInput.value=name; searchResults.style.display='none'; closeSheet(); loadGraph(name); }

// ===== Graph =====
async function loadGraph(center) {
  document.getElementById('loading').style.display='block';
  currentCenter = center||null;
  try {
    const url = center ? `/api/graph?center=${encodeURIComponent(center)}` : '/api/graph';
    const r = await fetch(url);
    const data = await r.json();
    document.getElementById('loading').style.display='none';
    renderGraph(data, center);
  } catch(e) { document.getElementById('loading').textContent='Error loading graph'; }
}

function renderGraph(data, center) {
  d3.select('#graph-container svg').remove();
  const container = document.getElementById('graph-container');
  const W = container.clientWidth, H = container.clientHeight;
  svg = d3.select('#graph-container').append('svg').attr('width',W).attr('height',H);

  const defs = svg.append('defs');
  ['calls','contains'].forEach(t => {
    defs.append('marker').attr('id','arr-'+t).attr('viewBox','0 -3 6 6')
      .attr('refX',16).attr('refY',0).attr('markerWidth',5).attr('markerHeight',5).attr('orient','auto')
      .append('path').attr('d','M0,-3L6,0L0,3').attr('fill',t==='calls'?'#58a6ff':'#3fb950').attr('opacity',.4);
  });
  const filt = defs.append('filter').attr('id','glow');
  filt.append('feGaussianBlur').attr('stdDeviation','3').attr('result','blur');
  filt.append('feMerge').selectAll('feMergeNode').data(['blur','SourceGraphic']).join('feMergeNode').attr('in',d=>d);

  g = svg.append('g');

  // Touch-friendly zoom
  const zoom = d3.zoom()
    .scaleExtent([.05,8])
    .on('zoom', e => { g.attr('transform',e.transform); });
  svg.call(zoom);

  // Dedup
  const nodeMap = new Map();
  data.nodes.forEach(n => { if(!nodeMap.has(n.id)) nodeMap.set(n.id,n); });
  const nodes = Array.from(nodeMap.values());
  const nodeIds = new Set(nodes.map(n=>n.id));
  const edges = data.edges.filter(e => nodeIds.has(e.source)&&nodeIds.has(e.target));
  nodes.forEach(n => { n.layer = detectLayer(n.name, n.file_path||''); });

  // Edges
  const link = g.append('g').selectAll('line').data(edges).join('line')
    .attr('class',d=>'link-'+(d.kind||'calls'))
    .attr('stroke-width',d=>d.kind==='calls'?1.5:1)
    .attr('marker-end',d=>d.kind==='same_file'?'':`url(#arr-${d.kind})`);

  // Nodes
  const nodeR = isMobile() ? 8 : 6; // bigger touch targets on mobile
  const centerR = isMobile() ? 14 : 11;
  const node = g.append('g').selectAll('g').data(nodes).join('g').attr('class','node');

  node.each(function(d) {
    const el = d3.select(this);
    const isCenter = center && d.name===center;
    if (d.kind==='file') {
      el.append('rect').attr('width',16).attr('height',10).attr('x',-8).attr('y',-5)
        .attr('rx',2).attr('fill',C.file).attr('stroke','#30363d').attr('stroke-width',1);
    } else {
      const r = isCenter ? centerR : (d.kind==='sibling'? (isMobile()?5:4) : nodeR);
      const color = C[d.kind] || layerColors[d.layer] || C.function;
      el.append('circle').attr('r',r).attr('fill',color)
        .attr('stroke',isCenter?'#f0f6fc':'#30363d').attr('stroke-width',isCenter?2.5:1);
      if (isCenter) el.select('circle').attr('filter','url(#glow)');
    }
  });

  // Labels
  const fontSize = isMobile() ? '7px' : '9px';
  node.append('text').attr('dx',d=>d.kind==='file'?12:10).attr('dy',3)
    .text(d=>d.kind==='file'?shortPath(d.name):d.name)
    .style('font-size',d=>(center&&d.name===center)? (isMobile()?'9px':'10px') : fontSize)
    .style('fill',d=>(center&&d.name===center)?'#f0f6fc':'#8b949e');

  // Tooltip (desktop only)
  if (!isMobile()) {
    node.on('mouseover',(e,d)=>{
      tooltip.style('display','block');
      tooltip.select('.tt-name').text(d.name);
      tooltip.select('.tt-file').text(d.file_path||'');
      const badge = tooltip.select('.tt-badge');
      badge.text(`${d.kind} / ${d.layer}`).style('background',(layerColors[d.layer]||'#21262d')+'33').style('color',layerColors[d.layer]||'#c9d1d9');
    })
    .on('mousemove',e=>tooltip.style('left',(e.pageX+12)+'px').style('top',(e.pageY-12)+'px'))
    .on('mouseout',()=>tooltip.style('display','none'));
  }

  // Click/Tap handler
  node.on('click',(e,d)=>{
    e.stopPropagation();
    if (d.kind!=='file') { searchInput.value=d.name; loadGraph(d.name); }
    if (isMobile()) {
      openSheet(d);
    } else {
      openSidebar(d);
    }
  });

  // Drag (works for touch too)
  node.call(d3.drag()
    .on('start',(e,d)=>{if(!e.active)simulation.alphaTarget(.3).restart();d.fx=d.x;d.fy=d.y;})
    .on('drag',(e,d)=>{d.fx=e.x;d.fy=e.y;})
    .on('end',(e,d)=>{if(!e.active)simulation.alphaTarget(0);d.fx=null;d.fy=null;}));

  // Simulation
  const chargeStrength = isMobile() ? -80 : -120;
  simulation = d3.forceSimulation(nodes)
    .force('link',d3.forceLink(edges).id(d=>d.id).distance(d=>d.kind==='same_file'?40:90))
    .force('charge',d3.forceManyBody().strength(d=>d.name===center?-500:chargeStrength))
    .force('center',d3.forceCenter(W/2,H/2))
    .force('collision',d3.forceCollide(isMobile()?22:18))
    .force('x',d3.forceX(W/2).strength(.02))
    .force('y',d3.forceY(H/2).strength(.02))
    .on('tick',()=>{
      link.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
      node.attr('transform',d=>`translate(${d.x},${d.y})`);
    });

  if (center) {
    const cn = nodes.find(n=>n.name===center);
    if (cn) {
      if (isMobile()) openSheet(cn);
      else openSidebar(cn);
    }
  }
}

function shortPath(p) { const s=p.split('/'); return s.length>2?'...'+'/'+s.slice(-2).join('/'):p; }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ===== Sidebar (Desktop) =====
function openSidebar(d) {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sb-title').textContent = d.name;
  document.getElementById('sb-content').innerHTML = buildEntityHTML(d);
  if (['function','caller','callee','sibling'].includes(d.kind)) fetchDetails(d.name, 'sb');
}
function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); }

// ===== Bottom Sheet (Mobile) =====
function openSheet(d) {
  document.getElementById('sheet-overlay').classList.add('open');
  const sheet = document.getElementById('sheet');
  sheet.classList.add('open');
  const content = document.getElementById('sheet-content');
  content.innerHTML = `<div class="sb-head"><h2 id="sheet-title">${esc(d.name)}</h2><button class="sb-close" onclick="closeSheet()">&times;</button></div>` + buildEntityHTML(d);
  if (['function','caller','callee','sibling'].includes(d.kind)) fetchDetails(d.name, 'ms');
}
function closeSheet() {
  document.getElementById('sheet-overlay').classList.remove('open');
  document.getElementById('sheet').classList.remove('open');
}

// Swipe down to dismiss sheet
let sheetTouchY = 0;
document.getElementById('sheet').addEventListener('touchstart', e => {
  sheetTouchY = e.touches[0].clientY;
});
document.getElementById('sheet').addEventListener('touchmove', e => {
  const dy = e.touches[0].clientY - sheetTouchY;
  if (dy > 80) closeSheet();
});

// ===== Shared Entity HTML Builder =====
function buildEntityHTML(d) {
  const lc = layerColors[d.layer]||'#21262d';
  let h = `<div class="sb-section">
    <span class="sb-badge" style="background:${(C[d.kind]||'#21262d')}22;color:${C[d.kind]||'#c9d1d9'}">${d.kind}</span>
    <span class="sb-badge" style="background:${lc}22;color:${lc};margin-left:4px">${d.layer} layer</span>
  </div>`;
  if (d.file_path) h += `<div class="sb-section"><h3>File</h3><div style="color:var(--text);word-break:break-all;font-size:12px">${esc(d.file_path)}</div></div>`;
  if (['function','caller','callee','sibling'].includes(d.kind)) {
    const prefix = isMobile() ? 'ms' : 'sb';
    h += `<div class="sb-section" id="${prefix}-sig"><h3>Signature</h3><div style="color:var(--text-dim)">Loading...</div></div>`;
    h += `<div class="sb-section" id="${prefix}-callers"><h3>Called By</h3><div style="color:var(--text-dim)">Loading...</div></div>`;
    h += `<div class="sb-section" id="${prefix}-callees"><h3>Calls</h3><div style="color:var(--text-dim)">Loading...</div></div>`;
  }
  return h;
}

async function fetchDetails(name, prefix) {
  const safe = name.replace(/'/g,'');
  try {
    const [sigR, callerR, calleeR] = await Promise.all([
      fetch(`/api/query?q=${encodeURIComponent(`SELECT signature,start_line,end_line FROM \`function\` WHERE name='${safe}' LIMIT 1`)}`),
      fetch(`/api/query?q=${encodeURIComponent(`SELECT <-calls<-\`function\`.{name,file_path} AS callers FROM \`function\` WHERE name='${safe}'`)}`),
      fetch(`/api/query?q=${encodeURIComponent(`SELECT ->calls->\`function\`.{name,file_path} AS callees FROM \`function\` WHERE name='${safe}'`)}`)
    ]);
    const [sig,caller,callee] = await Promise.all([sigR.json(),callerR.json(),calleeR.json()]);

    const sigEl = document.getElementById(`${prefix}-sig`);
    if (sigEl) {
      if (sig[0]?.signature) {
        sigEl.innerHTML = `<h3>Signature</h3><div class="sb-sig">${esc(sig[0].signature)}</div>
          <div style="color:var(--text-dim);font-size:10px;margin-top:4px">Lines ${sig[0].start_line}-${sig[0].end_line} (${sig[0].end_line-sig[0].start_line} lines)</div>`;
      } else sigEl.innerHTML = '<h3>Signature</h3><div style="color:var(--text-dim)">-</div>';
    }

    const renderList = (el,items,label) => {
      if (!el) return;
      if (items?.length) {
        el.innerHTML = `<h3>${label} (${items.length})</h3><ul class="sb-list">${items.map(c=>
          `<li onclick="nav('${(c.name||'').replace(/'/g,"\\'")}')"><b>${esc(c.name||'?')}</b> <span class="dim">${shortPath(c.file_path||'')}</span></li>`
        ).join('')}</ul>`;
      } else el.innerHTML = `<h3>${label}</h3><div style="color:var(--text-dim)">None</div>`;
    };
    renderList(document.getElementById(`${prefix}-callers`), caller[0]?.callers, 'Called By');
    renderList(document.getElementById(`${prefix}-callees`), callee[0]?.callees, 'Calls');
  } catch(e) {}
}

// ===== View Toggle =====
function setView(v) {
  currentView = v;
  document.querySelectorAll('.vt-btn').forEach(b=>b.classList.toggle('active',b.textContent.toLowerCase()===v));
  if (v==='table') loadTable();
  else {
    const gc = document.getElementById('graph-container');
    gc.innerHTML = '<div id="loading">Loading graph...</div><div id="legend"><div class="lg-item"><div class="lg-dot" style="background:var(--accent)"></div> Function</div><div class="lg-item"><div class="lg-dot" style="background:var(--purple)"></div> Class</div><div class="lg-item"><div class="lg-rect" style="background:var(--text-dim)"></div> File</div><div class="lg-item"><div class="lg-dot" style="background:var(--red)"></div> Caller</div><div class="lg-item"><div class="lg-dot" style="background:var(--green)"></div> Callee</div></div>';
    loadGraph(currentCenter);
  }
}

// ===== Mobile Nav =====
function mobileNav(tab) {
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('nav-'+tab)?.classList.add('active');

  if (tab==='graph') {
    closeSheet();
    setView('graph');
  } else if (tab==='table') {
    closeSheet();
    setView('table');
  } else if (tab==='search') {
    searchInput.focus();
  } else if (tab==='stats') {
    openStatsSheet();
  }
}

async function openStatsSheet() {
  const overlay = document.getElementById('sheet-overlay');
  const sheet = document.getElementById('sheet');
  overlay.classList.add('open');
  sheet.classList.add('open');
  const content = document.getElementById('sheet-content');
  content.innerHTML = '<div class="sb-head"><h2>Database Stats</h2><button class="sb-close" onclick="closeSheet()">&times;</button></div><div class="sb-section" style="color:var(--text-dim)">Loading...</div>';

  try {
    const r = await fetch('/api/stats');
    const d = await r.json();
    const labels = ['Files','Functions','Classes','Imports','Configs','Docs','Packages'];
    const icons = ['&#128196;','&#9881;','&#128230;','&#128279;','&#128295;','&#128214;','&#128230;'];
    let h = '<div class="sb-head"><h2>Database Stats</h2><button class="sb-close" onclick="closeSheet()">&times;</button></div>';
    h += '<div style="padding:12px 14px;display:grid;grid-template-columns:1fr 1fr;gap:8px">';
    if (Array.isArray(d)) d.forEach((item,i) => {
      const t = (typeof item==='object'&&item) ? (item.total||item.count||0) : 0;
      h += `<div style="background:#21262d;padding:12px;border-radius:8px;text-align:center">
        <div style="font-size:20px">${icons[i]||''}</div>
        <div style="font-size:22px;font-weight:700;color:var(--accent);margin:4px 0">${t.toLocaleString()}</div>
        <div style="font-size:11px;color:var(--text-dim)">${labels[i]||''}</div>
      </div>`;
    });
    h += '</div>';
    content.innerHTML = h;
  } catch(e) {
    content.innerHTML = '<div class="sb-section" style="color:var(--red)">Failed to load stats</div>';
  }
}

// ===== Table View =====
async function loadTable() {
  const container = document.getElementById('graph-container');
  container.innerHTML = `<div style="padding:12px;overflow:auto;height:100%;-webkit-overflow-scrolling:touch">
    <table id="fn-table" style="width:100%;border-collapse:collapse;font-size:12px">
      <thead><tr style="border-bottom:2px solid var(--border);text-align:left">
        <th style="padding:8px 6px;color:var(--text-dim);font-size:10px;text-transform:uppercase">Name</th>
        <th style="padding:8px 6px;color:var(--text-dim);font-size:10px;text-transform:uppercase">File</th>
        <th style="padding:8px 6px;color:var(--text-dim);font-size:10px;text-transform:uppercase">Size</th>
        <th style="padding:8px 6px;color:var(--text-dim);font-size:10px;text-transform:uppercase">Layer</th>
      </tr></thead>
      <tbody id="fn-tbody"><tr><td colspan="4" style="padding:20px;text-align:center;color:var(--text-dim)">Loading...</td></tr></tbody>
    </table>
  </div>`;

  try {
    const r = await fetch(`/api/query?q=${encodeURIComponent("SELECT name,file_path,start_line,end_line,(end_line-start_line) AS size FROM `function` ORDER BY size DESC LIMIT 100")}`);
    const data = await r.json();
    const tbody = document.getElementById('fn-tbody');
    if (!data.length) {
      tbody.innerHTML = '<tr><td colspan="4" style="padding:20px;text-align:center;color:var(--text-dim)">No functions indexed</td></tr>';
      return;
    }
    tbody.innerHTML = data.map(d => {
      const layer = detectLayer(d.name, d.file_path||'');
      return `<tr style="border-bottom:1px solid #21262d;cursor:pointer" onclick="nav('${(d.name||'').replace(/'/g,"\\'")}')">
        <td style="padding:8px 6px;color:var(--accent);font-weight:600">${esc(d.name||'?')}</td>
        <td style="padding:8px 6px;color:var(--text-dim);font-size:11px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(shortPath(d.file_path||''))}</td>
        <td style="padding:8px 6px">${d.size||0}L</td>
        <td style="padding:8px 6px"><span style="color:${layerColors[layer]};font-size:11px">${layer}</span></td>
      </tr>`;
    }).join('');
  } catch(e) {
    document.getElementById('fn-tbody').innerHTML = '<tr><td colspan="4" style="padding:20px;color:var(--red)">Error loading data</td></tr>';
  }
}

// ===== Handle resize =====
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => { if (currentView === 'graph') loadGraph(currentCenter); }, 300);
});

// ===== Init =====
loadStats();
loadGraph();
</script>
</body>
</html>
